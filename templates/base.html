<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>GVS {% block title %}{% endblock %}</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Rajdhani:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#050a14;--bg2:#0d1a2e;--nav:#060e1e;
  --gold:#f9c84a;--gold2:#e8a800;
  --blue:#1a6ef5;--blue2:#0d4db5;
  --text:#e8edf5;--muted:#8899aa;
  --card:#0d1a2e;--border:#1a2a40;
  --r:12px;
}
*{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{background:var(--bg);color:var(--text);font-family:'Rajdhani',sans-serif;font-size:16px;min-height:100vh;overflow-x:hidden;}

/* ── NAVBAR ── */
nav{position:fixed;top:0;left:0;right:0;z-index:999;background:rgba(6,14,30,0.95);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:0 5%;}
.nav-inner{display:flex;align-items:center;justify-content:space-between;height:64px;}
.logo{font-family:'Orbitron',sans-serif;font-size:1.6rem;font-weight:900;letter-spacing:3px;background:linear-gradient(135deg,var(--gold),#fff,var(--gold));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;animation:logoPulse 3s ease-in-out infinite;}
@keyframes logoPulse{0%,100%{filter:drop-shadow(0 0 6px var(--gold));}50%{filter:drop-shadow(0 0 16px var(--gold));}}
.nav-links{display:flex;align-items:center;gap:4px;flex-wrap:wrap;}
.nav-links a{color:var(--muted);text-decoration:none;padding:6px 14px;border-radius:6px;font-size:.95rem;font-weight:500;letter-spacing:.5px;transition:all .2s;position:relative;}
.nav-links a:hover,.nav-links a.active{color:var(--gold);background:rgba(249,200,74,.08);}
.nav-links a.active::after{content:'';position:absolute;bottom:-1px;left:14px;right:14px;height:2px;background:var(--gold);border-radius:2px;}
.nav-links a.btn-login{background:var(--gold);color:#050a14;font-weight:600;padding:6px 18px;}
.nav-links a.btn-login:hover{background:var(--gold2);color:#050a14;}
.nav-links a.btn-logout{border:1px solid #e24b4a;color:#e24b4a;}
.nav-links a.btn-logout:hover{background:#e24b4a;color:#fff;}

/* ── PAGE WRAPPER ── */
.page{padding-top:80px;min-height:100vh;}

/* ── SCROLL BAR ── */
::-webkit-scrollbar{width:5px;}
::-webkit-scrollbar-track{background:var(--bg);}
::-webkit-scrollbar-thumb{background:var(--gold2);border-radius:3px;}

/* ── ANIMATIONS ── */
@keyframes fadeUp{from{opacity:0;transform:translateY(30px);}to{opacity:1;transform:translateY(0);}}
@keyframes fadeIn{from{opacity:0;}to{opacity:1;}}
@keyframes slideIn{from{opacity:0;transform:translateX(-30px);}to{opacity:1;transform:translateX(0);}}
.anim-up{animation:fadeUp .7s ease both;}
.anim-in{animation:fadeIn .6s ease both;}
.d1{animation-delay:.1s;}.d2{animation-delay:.2s;}.d3{animation-delay:.3s;}.d4{animation-delay:.4s;}.d5{animation-delay:.5s;}

/* ── CARDS ── */
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:1.5rem;transition:border-color .3s,transform .3s;}
.card:hover{border-color:rgba(249,200,74,.3);transform:translateY(-3px);}

/* ── BUTTONS ── */
.btn{display:inline-block;padding:10px 24px;border-radius:8px;font-family:'Rajdhani',sans-serif;font-size:1rem;font-weight:600;cursor:pointer;border:none;transition:all .2s;letter-spacing:.5px;}
.btn-gold{background:var(--gold);color:#050a14;}
.btn-gold:hover{background:var(--gold2);transform:translateY(-2px);}
.btn-blue{background:var(--blue);color:#fff;}
.btn-blue:hover{background:var(--blue2);transform:translateY(-2px);}
.btn-outline{background:transparent;color:var(--gold);border:1px solid var(--gold);}
.btn-outline:hover{background:var(--gold);color:#050a14;}

/* ── SECTION TITLE ── */
.sec-title{font-family:'Orbitron',sans-serif;font-size:1.6rem;font-weight:700;color:var(--gold);margin-bottom:.5rem;letter-spacing:2px;}
.sec-sub{color:var(--muted);margin-bottom:2rem;font-size:1rem;}
.divider{width:60px;height:3px;background:linear-gradient(90deg,var(--gold),var(--blue));border-radius:2px;margin-bottom:1rem;}

/* ── FORM ── */
.form-group{margin-bottom:1.2rem;}
.form-group label{display:block;color:var(--muted);font-size:.9rem;margin-bottom:.4rem;letter-spacing:.5px;}
.form-group input,.form-group select,.form-group textarea{width:100%;padding:10px 14px;background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:'Rajdhani',sans-serif;font-size:1rem;outline:none;transition:border-color .2s;}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{border-color:var(--gold);}
.form-error{background:rgba(226,75,74,.12);border:1px solid rgba(226,75,74,.4);color:#f09595;padding:10px 14px;border-radius:8px;margin-bottom:1rem;font-size:.95rem;}
.form-success{background:rgba(30,200,100,.1);border:1px solid rgba(30,200,100,.3);color:#5dcaa5;padding:10px 14px;border-radius:8px;margin-bottom:1rem;font-size:.95rem;}

/* ── FOOTER ── */
footer{background:var(--nav);border-top:1px solid var(--border);padding:2rem 5%;text-align:center;color:var(--muted);font-size:.9rem;margin-top:4rem;}
footer .f-logo{font-family:'Orbitron',sans-serif;font-size:1.3rem;font-weight:900;color:var(--gold);letter-spacing:3px;margin-bottom:.5rem;}

/* ── STARS BG ── */
.stars{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0;overflow:hidden;}
.star{position:absolute;width:2px;height:2px;background:#fff;border-radius:50%;animation:twinkle var(--dur,3s) var(--del,0s) ease-in-out infinite;}
@keyframes twinkle{0%,100%{opacity:.1;}50%{opacity:.8;}}

/* ── RESPONSIVE ── */
@media(max-width:768px){
  .nav-inner{flex-direction:column;height:auto;padding:10px 0;gap:8px;}
  .nav-links{gap:2px;justify-content:center;}
  .nav-links a{padding:5px 10px;font-size:.85rem;}
  .page{padding-top:120px;}
}
</style>
</head>
<body>

<!-- Stars background -->
<div class="stars" id="stars"></div>

<nav>
  <div class="nav-inner">
    <a href="/" class="logo">GVS</a>
    <div class="nav-links">
      <a href="/" class="{% if request.endpoint=='home' %}active{% endif %}">Home</a>
      <a href="/about" class="{% if request.endpoint=='about' %}active{% endif %}">About Us</a>
      <a href="/courses" class="{% if request.endpoint=='courses' %}active{% endif %}">Courses</a>
      <a href="/contact" class="{% if request.endpoint=='contact' %}active{% endif %}">Contact</a>
      {% if user %}
        <a href="/attendance" class="{% if request.endpoint=='attendance' or request.endpoint=='attendance_admin' %}active{% endif %}">Attendance</a>
        {% if user.role == 'admin' %}
          <a href="/dashboard" class="{% if request.endpoint=='dashboard' %}active{% endif %}">Dashboard</a>
          <a href="/register" class="{% if request.endpoint=='register' %}active{% endif %}">Add Student</a>
        {% endif %}
        <span style="color:var(--muted);padding:6px 10px;font-size:.85rem;">Hi, {{ user.name }}</span>
        <a href="/logout" class="btn-logout">Logout</a>
      {% else %}
        <a href="/login" class="btn-login">Login</a>
      {% endif %}
    </div>
  </div>
</nav>

<div class="page">
  {% block content %}{% endblock %}
</div>

<footer>
  <div class="f-logo">GVS</div>
  <p>© 2024 GVS Institute. All rights reserved.</p>
</footer>

<script>
// Generate stars
const container = document.getElementById('stars');
for(let i=0;i<80;i++){
  const s=document.createElement('div');
  s.className='star';
  s.style.cssText=`left:${Math.random()*100}%;top:${Math.random()*100}%;--dur:${2+Math.random()*4}s;--del:${Math.random()*4}s;opacity:${Math.random()*.5};`;
  container.appendChild(s);
}

// Scroll reveal
const obs=new IntersectionObserver(entries=>{
  entries.forEach(e=>{if(e.isIntersecting){e.target.style.animationPlayState='running';}});
},{threshold:.1});
document.querySelectorAll('.anim-up,.anim-in').forEach(el=>{
  el.style.animationPlayState='paused';
  obs.observe(el);
});
</script>
{% block scripts %}{% endblock %}
</body>
</html>
