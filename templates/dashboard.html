{% extends "base.html" %}
{% block title %}| Dashboard{% endblock %}
{% block content %}
<style>
.inner-page{max-width:900px;margin:0 auto;padding:3rem 5%;position:relative;z-index:1;}
.dash-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:1.2rem;margin-bottom:2rem;}
.dash-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:1.5rem;text-align:center;}
.dash-num{font-family:'Orbitron',sans-serif;font-size:2.2rem;font-weight:700;color:var(--gold);}
.dash-label{color:var(--muted);font-size:.9rem;margin-top:.3rem;}
.quick-links{display:flex;gap:1rem;flex-wrap:wrap;margin-top:1rem;}
</style>
<div class="inner-page">
  <div class="sec-title anim-up">Admin Dashboard</div>
  <div class="divider anim-up d1"></div>
  <p class="sec-sub anim-up d2">Welcome back, {{ user.name }}!</p>
  <div class="dash-grid anim-up d2">
    <div class="dash-card"><div class="dash-num">{{ students|length }}</div><div class="dash-label">Total Students</div></div>
    <div class="dash-card"><div class="dash-num" style="color:#5dcaa5;">Active</div><div class="dash-label">System Status</div></div>
    <div class="dash-card"><div class="dash-num" style="color:#5da8ff;">Admin</div><div class="dash-label">Your Role</div></div>
  </div>
  <div class="sec-title anim-up" style="font-size:1.1rem;margin-bottom:1rem;">Quick Actions</div>
  <div class="quick-links anim-up d2">
    <a href="/register" class="btn btn-gold">+ Add Student</a>
    <a href="/attendance" class="btn btn-blue">View Attendance</a>
  </div>
</div>
{% endblock %}
