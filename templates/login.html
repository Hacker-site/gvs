{% extends "base.html" %}
{% block title %}| Login{% endblock %}
{% block content %}
<style>
.login-wrap{min-height:80vh;display:flex;align-items:center;justify-content:center;padding:2rem;position:relative;z-index:1;}
.login-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:2.5rem;width:100%;max-width:420px;animation:fadeUp .7s ease both;}
.login-logo{font-family:'Orbitron',sans-serif;font-size:2.5rem;font-weight:900;color:var(--gold);text-align:center;margin-bottom:.3rem;letter-spacing:4px;}
.login-sub{text-align:center;color:var(--muted);margin-bottom:2rem;font-size:.95rem;}
</style>
<div class="login-wrap">
  <div class="login-card">
    <div class="login-logo">GVS</div>
    <div class="login-sub">Apne account mein login karo</div>
    {% if error %}<div class="form-error">{{ error }}</div>{% endif %}
    <form method="POST">
      <div class="form-group"><label>Username</label><input name="username" type="text" placeholder="Enter username" required autofocus/></div>
      <div class="form-group"><label>Password</label><input name="password" type="password" placeholder="Enter password" required/></div>
      <button type="submit" class="btn btn-gold" style="width:100%;margin-top:.5rem;font-size:1.05rem;padding:12px;">Login Karo</button>
    </form>
    <p style="text-align:center;color:var(--muted);font-size:.85rem;margin-top:1.5rem;">Default Admin — Username: <code style="color:var(--gold);">admin</code> | Password: <code style="color:var(--gold);">admin123</code></p>
  </div>
</div>
{% endblock %}
